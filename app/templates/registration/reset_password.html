
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .login-container { background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); padding: 40px; width: 100%; max-width: 400px; }
        .business-logo { display: block; width: 72px; height: 72px; object-fit: cover; border-radius: 16px; margin: 0 auto 16px; }
        h1 { font-size: 28px; font-weight: 700; color: {{ primary_color }}; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
        input:focus { outline: none; border-color: {{ primary_color }}; box-shadow: 0 0 0 3px {{ primary_color }}1a; }
        button { width: 100%; padding: 12px; background: {{ primary_color }}; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .messages ul { list-style: none; background: #fee; border: 1px solid #fcc; color: #c33; padding: 12px; border-radius: 6px; font-size: 14px; margin-bottom: 20px; }
        .messages li { padding: 4px 0; }
    </style>
</head>
<body>
    <div class="login-container">
        {% if logo_url %}
            <img src="{{ logo_url }}" alt="{{ business_name }}" class="business-logo">
        {% endif %}
        <h1>{{ business_name or 'Nueva contraseña' }}</h1>
        <p class="subtitle">Elige una contraseña nueva para tu cuenta.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="messages"><ul>{% for message in messages %}<li>{{ message }}</li>{% endfor %}</ul></div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="password">Nueva contraseña</label>
                <input type="password" id="password" name="password" required minlength="8" placeholder="Mínimo 8 caracteres">
            </div>
            <button type="submit">Guardar nueva contraseña</button>
        </form>
    </div>
</body>
</html>
